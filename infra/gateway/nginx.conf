events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log debug;

    server {
        listen 80;
        server_name localhost;

        # Forward Istio-like identity headers passed from E2E testing client
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header user-id $http_user_id;
        proxy_set_header user-role $http_user_role;
        proxy_set_header user-email $http_user_email;
        proxy_set_header user-status $http_user_status;

        # 1. Identity Service
        location /api/v1/auth/ {
            proxy_pass http://identity-service:8080;
        }

        location /api/v1/upgrade-requests {
            proxy_pass http://identity-service:8080;
        }

        location /api/v1/admin/ {
            proxy_pass http://identity-service:8080;
        }

        location /api/v1/test/ {
            proxy_pass http://identity-service:8080;
        }

        # 2. Profile Service
        location /api/v1/profile/ {
            proxy_pass http://profile-service:8080;
        }

        location /api/v1/companions {
            proxy_pass http://profile-service:8080;
        }

        # 3. Booking Service
        location /api/v1/bookings {
            proxy_pass http://booking-service:8080;
        }

        # 4. Interaction Service
        location /api/v1/interaction/ {
            proxy_pass http://interaction-service:8080;
        }

        # 5. Notification Service (Path rewrite from /api/v1/notifications/* to /v1/notifications/*)
        location /api/v1/notifications/ {
            rewrite ^/api/v1/notifications/(.*)$ /v1/notifications/$1 break;
            proxy_pass http://notification-service:8080;
        }

        # 6. Finance Service
        location /api/v1/finance/ {
            proxy_pass http://finance-service:8080;
        }

        # 7. Dispute Service
        location /api/v1/disputes {
            proxy_pass http://dispute-service:8082;
        }

        # Global health check for Gateway
        location /health {
            return 200 '{"status":"UP"}';
            add_header Content-Type application/json;
        }
    }
}
