apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: strip-identity-headers
  namespace: istio-ingress
spec:
  # Target: Istio ingress gateway pod (global-gateway) tại namespace istio-ingress.
  # EnvoyFilter hoạt động trên ingress gateway (class: istio), KHÔNG phải waypoint proxy.
  #
  # Strip xảy ra tại điểm vào của mesh — TRƯỚC khi RequestAuthentication verify JWT:
  #   1. Strip user-id, user-email, user-role, user-status từ mọi request đến từ internet
  #   2. Waypoint proxy verify JWT và inject lại headers từ claims đã verify
  # → Client bên ngoài không thể giả mạo identity headers.
  workloadSelector:
    labels:
      gateway.networking.k8s.io/gateway-name: global-gateway
  configPatches:
    - applyTo: HTTP_ROUTE
      match:
        context: GATEWAY
      patch:
        operation: MERGE
        value:
          request_headers_to_remove:
            - "user-id"
            - "user-email"
            - "user-role"
            - "user-status"
