apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: profile-service
  namespace: profile-service
spec:
  interval: 5m
  chart:
    spec:
      chart: ./services/profile-service/deployments
      sourceRef:
        kind: GitRepository
        name: backend-gitops
        namespace: flux-system
  values:
    image:
      repository: ghcr.io/tianshi04/profile-service
      tag: latest # {"$imagepolicy": "flux-system:profile-service-policy"}
