apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: finance-service
  namespace: finance-service
spec:
  interval: 5m
  chart:
    spec:
      chart: ./services/finance-service/deployments
      sourceRef:
        kind: GitRepository
        name: backend-gitops
        namespace: flux-system
  values:
    image:
      repository: ghcr.io/tianshi04/finance-service
      tag: latest # {"$imagepolicy": "flux-system:finance-service-policy"}
