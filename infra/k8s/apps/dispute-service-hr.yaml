apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: dispute-service
  namespace: dispute-service
spec:
  interval: 5m
  chart:
    spec:
      chart: ./services/dispute-service/deployments
      sourceRef:
        kind: GitRepository
        name: backend-gitops
        namespace: flux-system
  values:
    image:
      repository: ghcr.io/tianshi04/dispute-service
      tag: latest # {"$imagepolicy": "flux-system:dispute-service-policy"}
