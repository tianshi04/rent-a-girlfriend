apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: root-health-route
  namespace: istio-ingress
spec:
  parentRefs:
    - name: global-gateway
      namespace: istio-ingress
  rules:
    - matches:
        - path:
            type: Exact
            value: /
      backendRefs:
        - name: cluster-info
          port: 80
