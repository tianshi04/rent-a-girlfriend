apiVersion: v1
kind: ConfigMap
metadata:
  name: global-gateway-config
  namespace: istio-ingress
data:
  deployment: |
    spec:
      template:
        spec:
          nodeSelector:
            ingress-ready: "true"
          containers:
          - name: istio-proxy
            ports:
            - name: http
              containerPort: 80
              hostPort: 80
  service: |
    spec:
      type: ClusterIP
