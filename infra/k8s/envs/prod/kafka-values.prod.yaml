global:
  imageRegistry: docker.io
  image:
    registry: docker.io
  security:
    allowInsecureImages: true

image:
  registry: docker.io
  repository: bitnamilegacy/kafka

provisioning:
  image:
    registry: docker.io
    repository: bitnamilegacy/kafka

kraft:
  enabled: true

# High availability setup for production
broker:
  replicaCount: 3
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  persistence:
    enabled: true
    size: 50Gi

controller:
  replicaCount: 3
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  persistence:
    enabled: true
    size: 10Gi

extraEnvVars:
  - name: KAFKA_HEAP_OPTS
    value: "-Xmx768m -Xms768m"
  - name: KAFKA_CFG_NUM_PARTITIONS
    value: "3"
  - name: KAFKA_CFG_DEFAULT_REPLICATION_FACTOR
    value: "3"
  - name: KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR
    value: "3"
  - name: KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
    value: "3"
  - name: KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR
    value: "2"

provisioning:
  enabled: false

networkPolicy:
  enabled: true
  extraIngress:
    # Allow Istio Ambient ztunnel HBONE traffic
    - ports:
        - port: 15008
          protocol: TCP
