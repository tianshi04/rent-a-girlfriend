apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - kafka-cluster.yaml

helmCharts:
  - name: strimzi-kafka-operator
    repo: https://strimzi.io/charts/
    version: 1.0.1
    releaseName: strimzi-operator
    namespace: kafka
    includeCRDs: true

patches:
  - target:
      group: gateway.networking.k8s.io
      version: v1
      kind: Gateway
      name: global-gateway
      namespace: istio-ingress
    patch: |-
      apiVersion: gateway.networking.k8s.io/v1
      kind: Gateway
      metadata:
        name: global-gateway
        namespace: istio-ingress
      spec:
        listeners:
          - name: http
            port: 80
            protocol: HTTP
            allowedRoutes:
              namespaces:
                from: All
          - name: https
            port: 443
            protocol: HTTPS
            allowedRoutes:
              namespaces:
                from: All
            tls:
              mode: Terminate
              certificateRefs:
                - name: global-gateway-cert
