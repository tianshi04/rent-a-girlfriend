name: Dispute Service CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'services/dispute-service/**'
      - 'contracts/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'services/dispute-service/**'
      - 'contracts/**'

defaults:
  run:
    working-directory: services/dispute-service

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "services/dispute-service/uv.lock"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "services/dispute-service/pyproject.toml"

      - name: Install dependencies
        run: uv sync

      - name: Generate gRPC Protobufs
        run: make generate-proto

      - name: Format Check (Ruff)
        run: uv run ruff format --check .

      - name: Lint Check (Ruff)
        run: uv run ruff check .

      - name: Run Tests (Pytest)
        run: uv run pytest -v

      - name: Log in to the Container registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: services/dispute-service
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/dispute-service:latest,ghcr.io/${{ github.repository_owner }}/dispute-service:${{ github.sha }}
