name: Identity Service CI

on:
  push:
    branches:
      - main
    paths:
      - 'services/identity-service/**'
      - '!services/identity-service/deployments/**'
      - 'contracts/**'
      - '.github/workflows/identity-service-ci.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'services/identity-service/**'
      - '!services/identity-service/deployments/**'
      - 'contracts/**'
      - '.github/workflows/identity-service-ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────
  # Quality Gates — 5 jobs chạy SONG SONG
  # build-image chỉ chạy khi TẤT CẢ 5 job đều pass.
  # ─────────────────────────────────────────────────────────────

  # ── Gate 1: Format Check ─────────────────────────────────────
  fmt-check:
    name: "Format Check (gofmt)"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true
          cache-dependency-path: services/identity-service/go.sum

      - name: Install Protoc Plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1
          go install github.com/grpc-ecosystem/grpc-gateway/v2/protoc-gen-grpc-gateway@v2.29.0

      - name: Generate Proto
        working-directory: services/identity-service
        run: |
          chmod +x scripts/gen_proto.sh
          ./scripts/gen_proto.sh

      - name: Run gofmt check
        working-directory: services/identity-service
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Unformatted files found:"
            gofmt -l .
            exit 1
          fi

  # ── Gate 2: Static Analysis ───────────────────────────────────
  lint:
    name: "Lint (golangci-lint)"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true
          cache-dependency-path: services/identity-service/go.sum

      - name: Install Protoc Plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1
          go install github.com/grpc-ecosystem/grpc-gateway/v2/protoc-gen-grpc-gateway@v2.29.0

      - name: Generate Proto
        working-directory: services/identity-service
        run: |
          chmod +x scripts/gen_proto.sh
          ./scripts/gen_proto.sh

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          working-directory: services/identity-service
          args: --timeout=5m

  # ── Gate 3: Unit Tests ────────────────────────────────────────
  unit-test:
    name: "Unit Tests"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true
          cache-dependency-path: services/identity-service/go.sum

      - name: Install Protoc Plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1
          go install github.com/grpc-ecosystem/grpc-gateway/v2/protoc-gen-grpc-gateway@v2.29.0

      - name: Generate Proto
        working-directory: services/identity-service
        run: |
          chmod +x scripts/gen_proto.sh
          ./scripts/gen_proto.sh

      - name: Run Unit Tests
        working-directory: services/identity-service
        run: |
          go test ./internal/... -short -v -count=1 -timeout=60s

  # ── Gate 4: Contract Tests ────────────────────────────────────
  contract-test:
    name: "Contract Tests"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true
          cache-dependency-path: services/identity-service/go.sum

      - name: Install Protoc Plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1
          go install github.com/grpc-ecosystem/grpc-gateway/v2/protoc-gen-grpc-gateway@v2.29.0

      - name: Generate Proto
        working-directory: services/identity-service
        run: |
          chmod +x scripts/gen_proto.sh
          ./scripts/gen_proto.sh

      - name: Run Contract Tests
        working-directory: services/identity-service
        run: |
          go test ./tests/contract/... -v -count=1 -timeout=60s

  # ── Gate 5: Integration Tests ─────────────────────────────────
  integration-test:
    name: "Integration Tests (Testcontainers)"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true
          cache-dependency-path: services/identity-service/go.sum

      - name: Install Protoc Plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1
          go install github.com/grpc-ecosystem/grpc-gateway/v2/protoc-gen-grpc-gateway@v2.29.0

      - name: Generate Proto
        working-directory: services/identity-service
        run: |
          chmod +x scripts/gen_proto.sh
          ./scripts/gen_proto.sh

      - name: Run Integration Tests
        working-directory: services/identity-service
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: |
          go test ./tests/integration/... -v -count=1 -timeout=120s


  # ─────────────────────────────────────────────────────────────
  # Job 2: Build → E2E → Smoke Test → Push
  #
  # Dockerfile has 3 stages: builder | test (alpine) | production (distroless)
  #
  # Build 1 → target=test,  BUILD_TAGS=""         → E2E test  → discard
  # Build 2 → target=test,  BUILD_TAGS=production → Smoke test (wget healthcheck works)
  # Build 3 → target=production (distroless),      BUILD_TAGS=production → push to GHCR
  #
  # Go binary is compiled twice (once per BUILD_TAGS value).
  # Build 3 reuses the cached builder layer from Build 2 → only assembles distroless layer (~30s).
  # ─────────────────────────────────────────────────────────────
  build-image:
    name: "Build, E2E & Smoke Test"
    needs: [fmt-check, lint, unit-test, contract-test, integration-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_digest: ${{ steps.push.outputs.digest }}

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}/identity-service
      IS_MAIN: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
      # Production image tag — reused by Smoke Test and Push steps
      PROD_IMAGE: identity-service:prod-${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get short SHA
        id: vars
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true
          cache-dependency-path: services/identity-service/go.sum

      - name: Install Protoc Plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1
          go install github.com/grpc-ecosystem/grpc-gateway/v2/protoc-gen-grpc-gateway@v2.29.0

      - name: Generate Proto
        working-directory: services/identity-service
        run: |
          chmod +x scripts/gen_proto.sh
          ./scripts/gen_proto.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Build 1: E2E Image (target=test, BUILD_TAGS="") ─────────────────────
      # Alpine runtime — mock-login endpoints compile in (//go:build !production).
      # Discarded after E2E. Warms the GHA builder-layer cache for Build 2.
      - name: Build E2E Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./services/identity-service
          file: ./services/identity-service/Dockerfile
          target: test
          load: true
          tags: identity-service:e2e-${{ github.sha }}
          build-args: BUILD_TAGS=
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── E2E TEST ──────────────────────────────────────────────────────────
      - name: Start E2E Stack
        working-directory: services/identity-service
        env:
          IDENTITY_IMAGE: identity-service:e2e-${{ github.sha }}
        run: |
          echo "==> Starting E2E stack with image: $IDENTITY_IMAGE"
          docker compose -f docker-compose.test.yml up -d --wait

      - name: Run E2E Tests
        working-directory: services/identity-service
        env:
          IDENTITY_IMAGE: identity-service:e2e-${{ github.sha }}
        run: |
          docker compose -f docker-compose.test.yml run --rm e2e-runner

      # if: always() đảm bảo cleanup chạy dù step trước pass, fail, hay bị cancel/timeout.
      # --remove-orphans: dọn container không thuộc compose file (edge case).
      # || true: cleanup không được phép fail và che khuất exit code của test.
      - name: Cleanup E2E Stack
        if: always()
        working-directory: services/identity-service
        run: |
          docker compose -f docker-compose.test.yml down -v --remove-orphans || true

      # ── Build 2: Smoke Test Image (target=test, BUILD_TAGS=production) ────────
      # Alpine runtime with BUILD_TAGS=production (test routes stripped).
      # Uses target=test so wget is available for docker-compose CMD-SHELL healthcheck.
      - name: Build Smoke Test Image
        uses: docker/build-push-action@v5
        with:
          context: ./services/identity-service
          file: ./services/identity-service/Dockerfile
          target: test
          load: true
          tags: ${{ env.PROD_IMAGE }}
          build-args: BUILD_TAGS=production
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── SMOKE TEST ────────────────────────────────────────────────────────
      # Verifies the production binary starts correctly under production runtime
      # config: GIN_MODE=release and ENABLE_TEST_ROUTES=false.
      - name: Start Smoke Test Stack
        working-directory: services/identity-service
        env:
          IDENTITY_IMAGE: ${{ env.PROD_IMAGE }}
        run: |
          echo "==> Starting Smoke Test stack with Production image: $IDENTITY_IMAGE"
          GIN_MODE=release ENABLE_TEST_ROUTES=false \
            docker compose -f docker-compose.test.yml up -d postgres-test redis-test identity-service-test --wait

      - name: Verify Smoke Test
        run: |
          echo "Smoke test PASSED! Production image starts successfully under GIN_MODE=release."

      # if: always() đảm bảo cleanup chạy kể cả khi service fail khởi động.
      - name: Cleanup Smoke Test Stack
        if: always()
        working-directory: services/identity-service
        run: |
          docker compose -f docker-compose.test.yml down -v --remove-orphans || true

      # ── Build 3: Distroless Image (target=production, BUILD_TAGS=production) ───
      # Reuses the cached builder layer from Build 2 — Go code NOT recompiled.
      # Only assembles the distroless runtime layer (~30s with warm GHA cache).
      # This is the image pushed to GHCR.
      - name: Log in to GHCR
        if: env.IS_MAIN == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Distroless Image to GHCR
        if: env.IS_MAIN == 'true'
        id: push
        uses: docker/build-push-action@v5
        with:
          context: ./services/identity-service
          file: ./services/identity-service/Dockerfile
          target: production
          push: true
          build-args: BUILD_TAGS=production
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output Image Digest for GitOps
        if: env.IS_MAIN == 'true'
        run: |
          echo "============================================="
          echo "DOCKER IMAGE DIGEST FOR GITOPS:"
          echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}"
          echo "============================================="

