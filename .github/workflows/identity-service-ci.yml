name: Identity Service CI

on:
  push:
    branches:
      - '*'
    paths:
      - "services/identity-service/**"
      - ".github/workflows/identity-service-ci.yml"

concurrency:
  group: identity-service-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  SERVICE_DIR: services/identity-service
  IMAGE_NAME: identity-service
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: ${{ env.SERVICE_DIR }}/go.sum

      - name: Run gofmt check
        run: |
          cd ${{ env.SERVICE_DIR }}
          gofmt -l . | tee /tmp/gofmt.out
          if [ -s /tmp/gofmt.out ]; then
            echo "Go files need formatting:"
            cat /tmp/gofmt.out
            exit 1
          fi

      - name: Run go vet
        run: |
          cd ${{ env.SERVICE_DIR }}
          go vet ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.59.0
          working-directory: ${{ env.SERVICE_DIR }}

  unit-test:
    name: Unit Tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: ${{ env.SERVICE_DIR }}/go.sum

      - name: Run unit tests
        run: |
          cd ${{ env.SERVICE_DIR }}
          make test-unit

  integration-test:
    name: Integration Tests
    needs: unit-test
    runs-on: ubuntu-latest
    env:
      # Testcontainers — Ryuk reaper không cần trong CI, Docker socket có sẵn
      TESTCONTAINERS_RYUK_DISABLED: "true"
      DOCKER_HOST: unix:///var/run/docker.sock
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: ${{ env.SERVICE_DIR }}/go.sum

      - name: Run integration tests
        run: |
          cd ${{ env.SERVICE_DIR }}
          make test-integration

  security-scan:
    name: Security Scan
    needs: integration-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: ${{ env.SERVICE_DIR }}/go.sum

      - name: Run gosec
        uses: securego/gosec@master
        with:
          args: ./...
          working-directory: ${{ env.SERVICE_DIR }}

  build-and-push:
    name: Build & Push Docker Image
    needs: security-scan
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=long
            type=ref,event=branch,prefix=branch-

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.SERVICE_DIR }}
          file: ${{ env.SERVICE_DIR }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:branch-${{ github.ref_name }}
          cache-to: type=registry,mode=max,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:branch-${{ github.ref_name }}

  e2e-local:
    name: Local Docker E2E
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      TESTCONTAINERS_RYUK_DISABLED: "true"
      DOCKER_HOST: unix:///var/run/docker.sock
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: ${{ env.SERVICE_DIR }}/go.sum

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run E2E via docker-compose.test.yml
        run: |
          cd ${{ env.SERVICE_DIR }}
          make test-e2e

      - name: Dump service logs on failure
        if: failure()
        run: |
          cd ${{ env.SERVICE_DIR }}
          docker compose -f docker-compose.test.yml logs identity-service-test || true

  update-gitops:
    name: Update GitOps Manifests
    needs: [build-and-push, e2e-local]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout GitOps branch
        uses: actions/checkout@v4
        with:
          ref: gitops

      - name: Setup yq
        uses: mikefarah/yq@master

      - name: Update image tag in HelmRelease
        run: |
          # Use the long commit SHA (matches the build-and-push tag format)
          IMAGE_TAG=${{ github.sha }}
          
          # Update the tag in the HelmRelease manifest
          yq e ".spec.values.image.tag = \"$IMAGE_TAG\"" -i infra/k8s/apps/identity-service-hr.yaml
          
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add infra/k8s/apps/identity-service-hr.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git commit -m "chore(gitops): update identity-service tag to $IMAGE_TAG"
          git push origin gitops

