name: Identity Service CI

on:
  push:
    branches:
      - main
    paths:
      - 'services/identity-service/**'
      - 'contracts/**'
      - '.github/workflows/identity-service-ci.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'services/identity-service/**'
      - 'contracts/**'
      - '.github/workflows/identity-service-ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: Quality Gates (Format, Lint, Unit, Integration Tests)
  # ─────────────────────────────────────────────────────────────
  lint-and-test:
    name: "Format, Lint & Test"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true
          cache-dependency-path: services/identity-service/go.sum

      - name: Install Protoc Plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1
          go install github.com/grpc-ecosystem/grpc-gateway/v2/protoc-gen-grpc-gateway@v2.29.0

      - name: Generate Proto
        working-directory: services/identity-service
        run: |
          chmod +x scripts/gen_proto.sh
          ./scripts/gen_proto.sh

      # Gate 1: Code Formatting
      - name: Run gofmt check
        working-directory: services/identity-service
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Unformatted files found:"
            gofmt -l .
            exit 1
          fi

      # Gate 2: Static Analysis
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          working-directory: services/identity-service
          args: --timeout=5m

      # Gate 3a: Unit Tests (no external deps, -short skips integration)
      - name: Run Unit Tests
        working-directory: services/identity-service
        run: |
          go test ./internal/... -short -v -count=1 -timeout=60s

      # Gate 3b: Integration Tests (Testcontainers — spins up postgres & redis automatically)
      - name: Run Integration Tests
        working-directory: services/identity-service
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: |
          go test ./tests/integration/... -v -count=1 -timeout=120s

  # ─────────────────────────────────────────────────────────────
  # Job 2: Build → E2E with built image → Smoke Test → Push
  # ─────────────────────────────────────────────────────────────
  build-image:
    name: "Build, E2E & Smoke Test"
    needs: lint-and-test
    runs-on: ubuntu-latest
    outputs:
      image_digest: ${{ steps.push.outputs.digest }}

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}/identity-service
      IS_MAIN: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get short SHA
        id: vars
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true
          cache-dependency-path: services/identity-service/go.sum

      - name: Install Protoc Plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1
          go install github.com/grpc-ecosystem/grpc-gateway/v2/protoc-gen-grpc-gateway@v2.29.0

      - name: Generate Proto
        working-directory: services/identity-service
        run: |
          chmod +x scripts/gen_proto.sh
          ./scripts/gen_proto.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build image và load vào local Docker daemon để tái sử dụng ngay bên dưới
      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./services/identity-service
          file: ./services/identity-service/Dockerfile
          load: true
          tags: identity-service:ci-${{ github.sha }}
          build-args: BUILD_TAGS=
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Chạy E2E tests bằng chính image vừa build — không build lại
      - name: Run E2E Tests
        working-directory: services/identity-service
        env:
          IDENTITY_IMAGE: identity-service:ci-${{ github.sha }}
        run: |
          echo "==> Running E2E tests with image: $IDENTITY_IMAGE"
          docker compose -f docker-compose.test.yml up -d --wait
          docker compose -f docker-compose.test.yml run --rm e2e-runner
          EXIT=$?
          docker compose -f docker-compose.test.yml down -v
          exit $EXIT

      # Container Smoke Test: xác nhận container khởi động không crash và /health phản hồi
      - name: Container Smoke Test
        working-directory: services/identity-service
        env:
          IDENTITY_IMAGE: identity-service:ci-${{ github.sha }}
        run: |
          echo "==> Starting Container Smoke Test using docker compose..."
          if ! docker compose -f docker-compose.test.yml up -d identity-service-test --wait; then
            echo "Smoke test FAILED!"
            docker compose -f docker-compose.test.yml logs identity-service-test
            docker compose -f docker-compose.test.yml down -v
            exit 1
          fi
          echo "Smoke test PASSED!"
          docker compose -f docker-compose.test.yml down -v

      # Chỉ push lên GHCR khi merge vào main (sau khi E2E + Smoke Test đã pass)
      - name: Log in to GHCR
        if: env.IS_MAIN == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        if: env.IS_MAIN == 'true'
        id: push
        uses: docker/build-push-action@v5
        with:
          context: ./services/identity-service
          file: ./services/identity-service/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # In Image Digest ra log để GitOps đọc và cập nhật manifest
      - name: Output Image Digest for GitOps
        if: env.IS_MAIN == 'true'
        run: |
          echo "============================================="
          echo "DOCKER IMAGE DIGEST FOR GITOPS:"
          echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}"
          echo "============================================="
