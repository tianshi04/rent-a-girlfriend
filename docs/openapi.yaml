    # -------------------------------------------------------------
    # NOTIFICATION SERVICE SCHEMAS
    # -------------------------------------------------------------
    FetchInboxResponse:
      type: object
      required:
        - data
        - paging
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/InboxNotificationDto'
        paging:
          $ref: '#/components/schemas/InboxPagingInfo'

    InboxNotificationDto:
      type: object
      required:
        - id
        - userId
        - eventId
        - type
        - priority
        - payload
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
          example: "11111111-2222-3333-4444-555555555555"
        userId:
          type: string
          format: uuid
          example: "22222222-3333-4444-5555-666666666666"
        eventId:
          type: string
          example: "evt_123"
        type:
          type: string
          enum: [TRANSACTIONAL, MARKETING]
          example: "TRANSACTIONAL"
        priority:
          type: string
          enum: [LOW, MEDIUM, HIGH, CRITICAL]
          example: "HIGH"
        payload:
          type: object
          description: Thân payload JSON động của thông báo
          example:
            title: "Yêu cầu đặt lịch mới"
            body: "Bạn có yêu cầu hẹn hò xem phim mới từ Kazuya."
            bookingId: "bk_cinema_888"
        status:
          type: string
          enum: [UNREAD, READ]
          example: "UNREAD"
        readAt:
          type: string
          format: date-time
          nullable: true
          example: "2026-06-20T17:05:00Z"
        createdAt:
          type: string
          format: date-time
          example: "2026-06-20T17:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-06-20T17:00:00Z"

    InboxPagingInfo:
      type: object
      required:
        - nextCursor
        - hasMore
      properties:
        nextCursor:
          type: string
          nullable: true
          example: "YmFzZTY0LWVuY29kZWQtY3Vyc29yLXN0cmluZw=="
        hasMore:
          type: boolean
          example: true

    MarkAllReadResponse:
      type: object
      required:
        - affectedRows
      properties:
        affectedRows:
          type: integer
          example: 5
