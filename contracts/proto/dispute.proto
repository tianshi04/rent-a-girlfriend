syntax = "proto3";

package dispute.v1;

option go_package = "github.com/rent-a-girlfriend/contracts/proto/dispute;disputev1";

service DisputeService {
  // Commands (REST for Query, gRPC for Commands)

  // CreateReport: Initiated by a Client or Companion.
  // [INV-D01] Only 1 active (OPEN/RESOLVING) dispute is permitted per booking.
  // Triggers immediate freezing of escrowed coins, suspending automatic completed payouts (BR-18).
  rpc CreateReport(CreateReportRequest) returns (DisputeCommandResponse);

  // ResolveDispute: Performed by system Admin only (INV-D03).
  // [INV-D02] Status changes to final decisions (REFUNDED, PAID_OUT, REJECTED) are immutable.
  // Triggers Dispute Refund SAGA or Dispute Payout SAGA workflow (BR-08a, BR-15).
  rpc ResolveDispute(ResolveDisputeRequest) returns (DisputeCommandResponse);
}

message CreateReportRequest {
  string booking_id = 1;
  string reporter_id = 2;
  string accused_id = 3;
  string reason = 4; // MISCONDUCT, NO_SHOW (BR-17: available after 30 mins)
  repeated EvidenceItem evidences = 5;
}

message EvidenceItem {
  string type = 1; // TEXT, IMAGE
  string content = 2;
}

message ResolveDisputeRequest {
  string dispute_id = 1;
  string admin_id = 2;
  string resolution = 3; // REFUND_CLIENT, PAYOUT_COMPANION, REJECT
  string notes = 4;
}

message DisputeCommandResponse {
  string dispute_id = 1;
  string status = 2; // OPEN, RESOLVED_REFUNDED, RESOLVED_PAID_OUT, REJECTED
  string message = 3;
}
