syntax = "proto3";

package notification.v1;

option go_package = "github.com/rent-a-girlfriend/contracts/proto/notification;notificationv1";

service NotificationService {
  // Commands (REST for Query, gRPC for Commands)
  
  // SendNotification: Enqueues a notification to be sent to a user.
  // [INV-N01] Max retry count configuration (e.g. 3 attempts).
  // [INV-N02] Once marked SENT, do not resend.
  rpc SendNotification(SendNotificationRequest) returns (NotificationResponse);
}

message SendNotificationRequest {
  string user_id = 1;
  string channel = 2; // SSE, FCM, EMAIL (BR-12 fallbacks)
  string title = 3;
  string body = 4;
}

message NotificationResponse {
  string notification_id = 1;
  string status = 2; // PENDING, SENT, FAILED
  string message = 3;
}
