syntax = "proto3";

package booking.v1;

option go_package = "github.com/rent-a-girlfriend/contracts/proto/booking;bookingv1";

import "google/protobuf/timestamp.proto";
import "common/v1/enums.proto";

service BookingService {
  // Commands (Atomic business state mutators - REST for Query, gRPC for Commands)
  
  // RequestBooking: Initiates a new booking. 
  // [INV-B01] Start time must be at least 2 hours in the future.
  // [INV-B04] Client cannot have >10 PENDING requests for the same companion.
  rpc RequestBooking(RequestBookingRequest) returns (BookingCommandResponse);

  // AcceptBooking: Companion accepts a booking, changing status from PENDING to ACCEPTED.
  // [INV-B03] Booking status must be PENDING.
  rpc AcceptBooking(AcceptBookingRequest) returns (BookingCommandResponse);

  // CancelBooking: Client or Companion cancels an accepted or pending booking.
  // [INV-B05] Booking status must not be COMPLETED or CANCELLED.
  // Triggers coin refund based on BR-05 (early: 100% refund) and BR-06/BR-07a (late/no-show rules).
  rpc CancelBooking(CancelBookingRequest) returns (BookingCommandResponse);

  // CompleteBooking: Formally completes the booking after end_time + 12h buffer has passed without dispute.
  // [INV-B05] Booking status must not be CANCELLED or COMPLETED.
  rpc CompleteBooking(CompleteBookingRequest) returns (BookingCommandResponse);

  // Internal Queries for Orchestrator & Gateway
  rpc GetBooking(GetBookingRequest) returns (BookingDetailResponse);
}

message CompleteBookingRequest {
  string booking_id = 1;
}

message RequestBookingRequest {
  string client_id = 1;
  string companion_id = 2;
  string scenario_id = 3;
  google.protobuf.Timestamp start_time = 4;
  int64 price = 5; // Kano-Coin (BR-04 integer representation)
  int32 duration_minutes = 6; // Standardized: 60, 120, 180 (INV-B02)
}

message AcceptBookingRequest {
  string booking_id = 1;
  string companion_id = 2; // Actor ID validation
}

message CancelBookingRequest {
  string booking_id = 1;
  string actor_id = 2;
  common.v1.CancellationReason reason = 3; 
}

message BookingCommandResponse {
  string booking_id = 1;
  common.v1.BookingStatus status = 2;
  string message = 3;
}

message GetBookingRequest {
  string booking_id = 1;
}

message BookingDetailResponse {
  string booking_id = 1;
  string client_id = 2;
  string companion_id = 3;
  int64 price = 4;
  int32 duration_minutes = 5;
  google.protobuf.Timestamp start_time = 6;
  google.protobuf.Timestamp end_time = 7;
  common.v1.BookingStatus status = 8;
  google.protobuf.Timestamp created_at = 9;
}
