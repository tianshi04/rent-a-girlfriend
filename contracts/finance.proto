syntax = "proto3";

package finance.v1;

option go_package = "github.com/rent-a-girlfriend/contracts/proto/finance;financev1";

import "common/v1/enums.proto";

service FinanceService {
  // Commands (Atomic coin movement operations - REST for Query, gRPC for Commands)
  
  // FreezeCoin: Locks coins during Booking Request.
  // [INV-F01] Available balance must remain >= 0.
  // [INV-F02] Amount requested to freeze must not exceed Available balance.
  rpc FreezeCoin(FreezeCoinRequest) returns (FinanceCommandResponse);

  // TransferToEscrow: Converts frozen coins into an Escrow held state upon Booking Acceptance.
  // [INV-F04] Only 1 HELD escrow allowed per booking.
  rpc TransferToEscrow(TransferToEscrowRequest) returns (FinanceCommandResponse);

  // ProcessPayout: Resolves the Escrow to payout to Companion (with commission deduction).
  // [INV-F05] Escrow status must be HELD.
  rpc ProcessPayout(ProcessPayoutRequest) returns (FinanceCommandResponse);

  // RefundEscrow: Compensation step to refund from Escrow/Frozen back to client's Available balance.
  // [INV-F03] Refund amount must not exceed frozen/escrow balance.
  // [INV-F05] Escrow status must be HELD.
  rpc RefundEscrow(RefundEscrowRequest) returns (FinanceCommandResponse);

  // Internal Query
  rpc GetWallet(GetWalletRequest) returns (GetWalletResponse);
}

message FreezeCoinRequest {
  string user_id = 1;
  int64 amount = 2; // Kano-Coin value
  string booking_id = 3; // Used as reference_id
  common.v1.TransactionType type = 4;
}

message TransferToEscrowRequest {
  string user_id = 1;
  string booking_id = 2;
  int64 amount = 3;
}

message ProcessPayoutRequest {
  string booking_id = 1;
  string companion_id = 2;
  double commission_rate = 3; // Platonic fee % (e.g. 0.10 for 10% platform fee)
}

message RefundEscrowRequest {
  string booking_id = 1;
  string client_id = 2;
  int64 refund_amount = 3;
}

message FinanceCommandResponse {
  string transaction_id = 1;
  string status = 2; // SUCCESS, FAILED
  string message = 3;
}

message GetWalletRequest {
  string user_id = 1;
}

message GetWalletResponse {
  string wallet_id = 1;
  string user_id = 2;
  int64 available_balance = 3;
  int64 frozen_balance = 4;
}
