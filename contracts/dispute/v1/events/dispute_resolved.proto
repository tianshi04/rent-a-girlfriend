syntax = "proto3";

package dispute.v1;

option go_package = "github.com/rent-a-girlfriend/contracts/proto/dispute/events;disputev1events";

import "google/protobuf/timestamp.proto";

message DisputeResolved {
  string dispute_id = 1;
  string booking_id = 2;
  string resolution = 3;
  google.protobuf.Timestamp occurred_at = 4;
  string resolved_by = 5;
  string reporter_id = 6;
  string accused_id = 7;
}

