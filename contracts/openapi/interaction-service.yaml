openapi: 3.0.3
info:
  title: Interaction Service Query API
  description: |
    REST API for querying chatroom status, listing chat participants, and reading companion reviews.
    Complies with the rule: REST for Query, gRPC for Commands.
  version: 1.0.0
servers:
  - url: /api/v1
    description: Interaction Service API Gateway

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ChatRoomResponse:
      type: object
      properties:
        roomId: { type: string, format: uuid }
        bookingId: { type: string, format: uuid }
        clientUserId: { type: string, format: uuid }
        companionUserId: { type: string, format: uuid }
        status: { type: string, enum: [ACTIVE, LOCKED], description: "LOCKED 24h after booking ends or upon cancellation (BR-15)." }
        lockedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }

    ReviewResponse:
      type: object
      properties:
        reviewId: { type: string, format: uuid }
        bookingId: { type: string, format: uuid }
        clientId: { type: string, format: uuid }
        companionId: { type: string, format: uuid }
        rating: { type: integer, minimum: 1, maximum: 5, example: 5 }
        comment: { type: string, example: "Dịch vụ rất chu đáo và đúng giờ!" }
        createdAt: { type: string, format: date-time }

    PaginatedReviews:
      type: object
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/ReviewResponse' }
        total: { type: integer, format: int64 }
        page: { type: integer }
        pageSize: { type: integer }

paths:
  /interaction/chatrooms/{bookingId}:
    get:
      tags: [Chat Query]
      summary: Get metadata and status of a booking's chatroom
      security:
        - bearerAuth: []
      parameters:
        - name: bookingId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Chatroom found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ChatRoomResponse' }
        '401':
          description: Unauthorized JWT
        '403':
          description: Forbidden (Not a participant in the booking)
        '404':
          description: Chatroom not found

  /interaction/companions/{companionId}/reviews:
    get:
      tags: [Review Query]
      summary: Retrieve all visible ratings and reviews for a companion
      parameters:
        - name: companionId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: page_size
          in: query
          schema: { type: integer, default: 10 }
      responses:
        '200':
          description: List of reviews retrieved successfully
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaginatedReviews' }
        '404':
          description: Companion not found
