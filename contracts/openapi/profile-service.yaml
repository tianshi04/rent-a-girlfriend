openapi: 3.0.3
info:
  title: Profile & Catalogue Service Query API
  description: |
    REST API for querying companion profiles, scenarios, voice intros, and catalogue searches.
    Encapsulates the "Magazine View" for Clients and query-only needs.
  version: 1.0.0
servers:
  - url: /api/v1
    description: Profile & Catalogue Service API Gateway

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ScenarioResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string, example: "Hẹn hò rạp chiếu phim" }
        description: { type: string, example: "Hẹn hò xem phim lãng mạn tại rạp chiếu phim CGV" }
        price: { type: integer, example: 500 }
        duration: { type: integer, description: "Duration in minutes", example: 120 }
        status: { type: string, enum: [ACTIVE, INACTIVE] }

    CompanionProfileDetail:
      type: object
      properties:
        companionId: { type: string, format: uuid }
        displayName: { type: string, example: "Chizuru Mizuhara" }
        avatarUrl: { type: string, format: uri, example: "https://storage.rentgf.com/avatars/chizuru.png" }
        introText: { type: string, example: "Chào bạn, mình rất vui được đồng hành cùng bạn!" }
        availableCities:
          type: array
          items: { type: string }
          example: ["Hanoi", "HCM"]
        voiceIntroUrl:
          type: string
          format: uri
          description: Presigned link to listen to Voice Intro (MP3, max 30s, 5MB).
          example: "https://storage.rentgf.com/voice-intros/chizuru.mp3"
        albumUrls:
          type: array
          items: { type: string, format: uri }
          description: Up to 4 album photos (max 2MB each).
          example: ["https://storage.rentgf.com/albums/chizuru_1.png", "https://storage.rentgf.com/albums/chizuru_2.png"]
        averageRating: { type: number, format: float, example: 4.9 }
        totalReviews: { type: integer, example: 150 }
        scenarios:
          type: array
          items: { $ref: '#/components/schemas/ScenarioResponse' }
        status: { type: string, enum: [PENDING, APPROVED, REJECTED] }

    CompanionCard:
      type: object
      description: Condensed profile view for homepage and list search results.
      properties:
        companionId: { type: string, format: uuid }
        displayName: { type: string, example: "Chizuru Mizuhara" }
        avatarUrl: { type: string, format: uri, example: "https://storage.rentgf.com/avatars/chizuru.png" }
        averageRating: { type: number, format: float, example: 4.9 }
        city: { type: string, example: "Hanoi" }
        startingPrice: { type: integer, description: "Lowest price scenario", example: 300 }

    PaginatedCompanions:
      type: object
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/CompanionCard' }
        total: { type: integer, format: int64 }
        page: { type: integer }
        pageSize: { type: integer }

paths:
  /profile/companions:
    get:
      tags: [Catalogue Query]
      summary: Search and filter approved Companion profiles (Catalogue Search)
      parameters:
        - name: name
          in: query
          required: false
          schema: { type: string }
        - name: city
          in: query
          description: Filter by target city (BR-19)
          required: false
          schema: { type: string }
        - name: min_price
          in: query
          required: false
          schema: { type: integer }
        - name: max_price
          in: query
          required: false
          schema: { type: integer }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: page_size
          in: query
          schema: { type: integer, default: 10 }
      responses:
        '200':
          description: Search results successfully fetched
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaginatedCompanions' }

  /profile/companions/{id}:
    get:
      tags: [Catalogue Query]
      summary: Retrieve detailed companion profile (Magazine View)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Companion details retrieved successfully
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CompanionProfileDetail' }
        '404':
          description: Companion not found or not approved

  /profile/me:
    get:
      tags: [Profile Management Query]
      summary: Get own profile details for Companion dashboard
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successfully fetched personal profile
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CompanionProfileDetail' }
        '401':
          description: Unauthorized
