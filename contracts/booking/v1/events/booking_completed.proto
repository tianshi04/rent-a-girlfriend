syntax = "proto3";

package booking.v1.events;

option go_package = "github.com/rent-a-girlfriend/booking-service/gen/proto;bookingv1";

import "google/protobuf/timestamp.proto";

message BookingCompleted {
  string booking_id = 1;
  string companion_id = 2;
  string client_id = 3;
  int64 price = 4;
  google.protobuf.Timestamp occurred_at = 5;
}
