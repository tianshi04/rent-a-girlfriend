syntax = "proto3";

package booking.v1;

option go_package = "github.com/rent-a-girlfriend/booking-service/gen/proto;bookingv1";

import "common/v1/enums.proto";

message ListBookingsRequest {
  string actor_id = 1;
  string actor_role = 2; // "CLIENT" or "COMPANION"
  int64 page_size = 3;
  string page_token = 4;
  string view = 5; // e.g. "pending", "upcoming", "history"
}
