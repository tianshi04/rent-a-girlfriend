syntax = "proto3";

package interaction.v1;

option go_package = "github.com/rent-a-girlfriend/contracts/proto/interaction;interactionv1";

service InteractionService {
  // Chat Commands (REST for Query, gRPC for Commands)
  
  // CreateChatRoom: Triggered when Booking is ACCEPTED.
  rpc CreateChatRoom(CreateChatRoomRequest) returns (ChatCommandResponse);

  // LockChatRoom: Automatically locks a chatroom after end_time + 24 hours (BR-15).
  // [INV-I03] Once locked, chatroom cannot be active again.
  rpc LockChatRoom(LockChatRoomRequest) returns (ChatCommandResponse);

  // Review Commands
  
  // SubmitReview: Client posts rating and comments.
  // [INV-I04] Only 1 Review allowed per booking.
  // [INV-I05] Rating must be between 1 and 5.
  // [BR-08] Client can submit once current time >= booking end_time.
  // [BR-10] Reviews cannot be updated or deleted by users.
  rpc SubmitReview(SubmitReviewRequest) returns (ReviewCommandResponse);

  // HideReview: Admin or SAGA soft-deletes a review if dispute resolves as Client Refund.
  // [BR-08a] Soft-deleted reviews are hidden from public view but kept for audit.
  rpc HideReview(HideReviewRequest) returns (ReviewCommandResponse);
}

message CreateChatRoomRequest {
  string booking_id = 1;
  string client_id = 2;
  string companion_id = 3;
}

message LockChatRoomRequest {
  string booking_id = 1;
}

message SubmitReviewRequest {
  string booking_id = 1;
  string client_id = 2;
  string companion_id = 3;
  int32 rating = 4; // Scale 1 to 5 (INV-I05)
  string comment = 5;
}

message HideReviewRequest {
  string booking_id = 1;
  string reason = 2;
}

message ChatCommandResponse {
  string room_id = 1;
  string status = 2; // ACTIVE, LOCKED
  string message = 3;
}

message ReviewCommandResponse {
  string review_id = 1;
  string status = 2; // VISIBLE, HIDDEN
  string message = 3;
}
