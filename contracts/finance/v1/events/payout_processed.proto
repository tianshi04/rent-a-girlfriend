syntax = "proto3";

package finance.v1;

option go_package = "github.com/rent-a-girlfriend/contracts/proto/finance/events;financev1events";

import "google/protobuf/timestamp.proto";

message PayoutProcessed {
  string booking_id = 1;
  string companion_id = 2;
  int64 amount = 3;
  int64 commission_amount = 4;
  int64 net_amount = 5;
  google.protobuf.Timestamp occurred_at = 6;
}
