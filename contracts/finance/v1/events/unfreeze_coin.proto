syntax = "proto3";

package finance.v1;

option go_package = "github.com/rent-a-girlfriend/contracts/proto/finance/events;financev1events";

import "google/protobuf/timestamp.proto";

message UnfreezeCoin {
  string booking_id = 1;
  string user_id = 2;
  int64 amount = 3;
  google.protobuf.Timestamp occurred_at = 4;
}
