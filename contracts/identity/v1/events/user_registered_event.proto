syntax = "proto3";

package identity.v1.events;

option go_package = "github.com/rent-a-girlfriend/identity-service/gen/proto;identityv1";

import "google/protobuf/timestamp.proto";

// UserRegisteredPayload — payload of domain event UserRegistered.
// Emitted when a new user account is created.
// CloudEvent type: identity.user-registered.v1
message UserRegisteredPayload {
  string user_id   = 1;
  string email     = 2;
  string name      = 3;
  string role      = 4;
  string google_id = 5;
  google.protobuf.Timestamp timestamp = 6;
  
}
