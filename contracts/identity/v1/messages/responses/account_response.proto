syntax = "proto3";

package identity.v1;

option go_package = "github.com/rent-a-girlfriend/identity-service/internal/gen/proto;identityv1";

import "google/protobuf/timestamp.proto";

// AccountResponse — thông tin account trả về cho Admin.
message AccountResponse {
  string                    id              = 1;
  string                    email           = 2;
  string                    role            = 3;
  string                    status          = 4;
  int32                     violation_count = 5;
  google.protobuf.Timestamp created_at      = 6;
}
