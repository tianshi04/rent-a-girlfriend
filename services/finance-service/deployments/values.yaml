namespace:
  create: true
  labels:
    team: backend
    purpose: finance-management
    service: finance-service

replicaCount: 2

image:
  repository: ghcr.io/tianshi04/rent-a-girlfriend/finance-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  ports:
    http: 8080
    grpc: 50051

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

config:
  SERVER_PORT: "8080"
  GRPC_PORT: "50051"
  APP_ENV: "production"
  DB_HOST: "postgres-postgresql.postgres-namespace.svc.cluster.local"
  DB_PORT: "5432"
  DB_USER: "finance_admin"
  DB_NAME: "finance_service"
  DB_SSLMODE: "disable"
  KAFKA_BROKERS: "kafka-1.kafka-namespace.svc.cluster.local:9092"
  KAFKA_TOPIC_FINANCE: "finance.events"
  KAFKA_TOPIC_IDENTITY: "identity.events"
  OUTBOX_POLLING_INTERVAL_MS: "500"
  OUTBOX_BATCH_SIZE: "50"
  VNPAY_URL: "https://sandbox.vnpayment.vn/paymentv2/vpcpay.html"
  VNPAY_RETURN_URL: "http://api.example.com/payment-status"

secrets:
  DB_PASSWORD: ""
  KAFKA_USERNAME: ""
  KAFKA_PASSWORD: ""
  VNPAY_TMN_CODE: ""
  VNPAY_HASH_SECRET: ""

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

gateway:
  enabled: false
  hostname: "finance.example.com"
  tls:
    certificateName: "finance-service-tls"

httpRoute:
  enabled: true
  hosts:
    - "finance.example.com"
  paths:
    - /api/v1/finance
    - /api/v1/wallets
    - /health

  authorizationPolicy:
    enabled: true

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000

tolerations: []

nodeSelector: {}

affinity: {}

extraEnv: []

extraVolumeMounts: []

extraVolumes: []
