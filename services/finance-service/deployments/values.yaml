namespace:
  create: true
  labels:
    team: backend
    purpose: booking-management
    service: finance-service
  istio:
    # Set to false in dev/local environments to skip Istio Ambient injection
    ambientEnabled: true

replicaCount: 3

image:
  repository: your-registry/finance-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  ports:
    http: 8080
    grpc: 50051

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

config:
  SERVER_PORT: "8080"
  GRPC_PORT: "50051"
  APP_ENV: "production"
  KAFKA_BROKERS: "kafka-headless.kafka.svc.cluster.local:9092"
  KAFKA_TOPIC_FINANCE: "finance.events"
  KAFKA_TOPIC_IDENTITY: "identity.events"
  KAFKA_TOPIC_BOOKING: "booking.events"
  KAFKA_GROUP_ID: "finance-service-group"
  OUTBOX_POLLING_INTERVAL_MS: "500"
  OUTBOX_BATCH_SIZE: "50"
  DB_CLEANUP_INTERVAL_MINUTES: "30"
  OUTBOX_RETENTION_DAYS: "1"
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_USER: "finance_admin"
  DB_NAME: "finance_service"
  DB_SSLMODE: "disable"
  VNPAY_TMN_CODE: "DEMO2019"
  VNPAY_URL: "https://sandbox.vnpayment.vn/paymentv2/vpcpay.html"
  VNPAY_RETURN_URL: "http://localhost:3000/payment-status"

secrets:
  # Do NOT set values here. Inject via CI/CD:
  DB_PASSWORD: ""
  KAFKA_USERNAME: ""
  KAFKA_PASSWORD: ""
  VNPAY_HASH_SECRET: ""

hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

gateway:
  enabled: false
  hostname: "booking.com"
  tls:
    certificateName: "finance-service-tls"

httpRoute:
  enabled: true
  hosts:
    - "booking.com"
  paths:
    - /api/v1
    - /health

grpcRoute:
  enabled: true
  hosts:
    - "booking.com"
  services:
    - "booking.v1.BookingService"

authorizationPolicy:
  enabled: true
  principals: []

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000

tolerations: []
nodeSelector: {}
affinity: {}
extraEnv: []
extraVolumeMounts: []
extraVolumes: []
