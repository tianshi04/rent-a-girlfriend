apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "finance-service.fullname" . }}
  labels:
    {{- include "finance-service.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "finance-service.fullname" . }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  minReadySeconds: 10
  revisionHistoryLimit: 3
  template:
    metadata:
      labels:
        app: {{ include "finance-service.fullname" . }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/k8s/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/k8s/secret.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "finance-service.fullname" . }}
      securityContext:
        runAsNonRoot: {{ .Values.podSecurityContext.runAsNonRoot }}
        runAsUser: {{ .Values.podSecurityContext.runAsUser }}
      nodeSelector:{{ toYaml .Values.nodeSelector | nindent 8 }}
      tolerations:{{ toYaml .Values.tolerations | nindent 8 }}
      affinity:{{ toYaml .Values.affinity | nindent 8 }}
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: wait-for-postgres
          image: postgres:15-alpine
          command:
            - /bin/sh
            - -c
            - |
              echo "Waking up DB and waiting for it to be ready..."
              until pg_isready -h "$DB_HOST" -U "$DB_USER" -d "$DB_NAME"; do
                echo "Waiting for PostgreSQL to start..."
                sleep 2
              done
              echo "PostgreSQL is ready!"
          envFrom:
            - secretRef:
                name: {{ include "finance-service.fullname" . }}-secrets
      containers:
        - name: finance-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.ports.http }}
              name: http
            - containerPort: {{ .Values.service.ports.grpc }}
              name: grpc
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
          envFrom:
            - configMapRef:
                name: {{ include "finance-service.fullname" . }}-config
            - secretRef:
                name: {{ include "finance-service.fullname" . }}-secrets
          volumeMounts:
            - name: config-volume
              mountPath: /etc/config
              readOnly: true
            - name: secret-volume
              mountPath: /etc/secrets
              readOnly: true
            {{- if .Values.extraVolumeMounts }}
            {{- toYaml .Values.extraVolumeMounts | nindent 12 }}
            {{- end }}
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
          startupProbe:
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: config-volume
          configMap:
            name: {{ include "finance-service.fullname" . }}-config
        - name: secret-volume
          secret:
            secretName: {{ include "finance-service.fullname" . }}-secrets
        {{- if .Values.extraVolumes }}
        {{- toYaml .Values.extraVolumes | nindent 8 }}
        {{- end }}
