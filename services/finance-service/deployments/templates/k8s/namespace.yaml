{{- if .Values.namespace.create }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Release.Namespace }}
  labels:
    app: {{ include "finance-service.name" . }}
    {{- if .Values.namespace.istio.ambientEnabled }}
    istio.io/dataplane-mode: ambient
    {{- end }}
    {{- with .Values.namespace.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
