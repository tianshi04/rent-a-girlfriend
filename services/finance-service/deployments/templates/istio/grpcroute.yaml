{{- if .Values.grpcRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: GRPCRoute
metadata:
  name: {{ include "finance-service.fullname" . }}-grpcroute
  labels:
    {{- include "finance-service.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ include "finance-service.fullname" . }}
      kind: Service
      group: ""
  hostnames:
  {{- range .Values.grpcRoute.hosts }}
    - {{ . | quote }}
  {{- end }}
  rules:
    {{- range .Values.grpcRoute.services }}
    - matches:
        - method:
            service: {{ . | quote }}
      backendRefs:
        - name: {{ include "finance-service.fullname" $ }}
          port: {{ $.Values.service.ports.grpc }}
    {{- end }}
{{- end }}
