{{- if .Values.istio.authorizationPolicy.enabled }}
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: {{ include "finance-service.fullname" . }}-authz
  labels:
    {{- include "finance-service.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: {{ include "finance-service.fullname" . }}
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/*/sa/*"
{{- end }}
