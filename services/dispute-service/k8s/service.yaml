apiVersion: v1
kind: Service
metadata:
  name: dispute-service
  labels:
    app: dispute-service
spec:
  type: ClusterIP
  selector:
    app: dispute-service
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
    - name: grpc
      protocol: TCP
      port: 50051
      targetPort: 50051
