apiVersion: apps/v1
kind: Deployment
metadata:
  name: dispute-service
  labels:
    app: dispute-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dispute-service
  template:
    metadata:
      labels:
        app: dispute-service
    spec:
      containers:
        - name: dispute-service
          image: dispute-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
            - name: grpc
              containerPort: 50051
          envFrom:
            - configMapRef:
                name: dispute-service-config
            - secretRef:
                name: dispute-service-secret
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /api/v1/healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
