apiVersion: v1
kind: Service
metadata:
  name: {{ include "dispute-service.fullname" . }}
  labels:
    {{- include "dispute-service.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ include "dispute-service.fullname" . }}
  ports:
    - name: http
      port: {{ .Values.service.ports.http }}
      targetPort: http
    - name: grpc
      port: {{ .Values.service.ports.grpc }}
      targetPort: grpc
