{{- if .Values.httpRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: {{ include "dispute-service.fullname" . }}-httproute
  labels:
    {{- include "dispute-service.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: global-gateway
      namespace: istio-ingress
  hostnames:
{{- range .Values.httpRoute.hosts }}
    - {{ . | quote }}
{{- end }}
  rules:
{{- range .Values.httpRoute.paths }}
    - matches:
        - path:
            type: PathPrefix
            value: {{ . }}
      backendRefs:
        - name: {{ include "dispute-service.fullname" $ }}
          port: 8080
{{- end }}
{{- end }}
