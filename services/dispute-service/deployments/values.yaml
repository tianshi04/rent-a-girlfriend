namespace:
  create: true
  labels:
    team: backend
    purpose: dispute-management
    service: dispute-service
  istio:
    # Set to false in dev/local environments to skip Istio Ambient injection
    ambientEnabled: true

replicaCount: 3

image:
  repository: your-registry/dispute-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  ports:
    http: 8080
    grpc: 50051

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

config:
  SERVER_PORT: "8080"
  GRPC_PORT: "50051"
  APP_ENV: "production"
  KAFKA_BROKERS: "kafka-headless.kafka.svc.cluster.local:9092"
  KAFKA_TOPIC_DISPUTE: "dispute.events"
  OUTBOX_POLLING_INTERVAL_MS: "500"
  OUTBOX_BATCH_SIZE: "50"
  SAGA_RETRY_INTERVAL_SECONDS: "5.0"
  USE_MOCKS: "true"
  FINANCE_SERVICE_ADDR: "finance-service.finance-service.svc.cluster.local:50051"
  INTERACTION_SERVICE_ADDR: "interaction-service.interaction-service.svc.cluster.local:50051"
  DB_CLEANUP_INTERVAL_MINUTES: "30"
  PROCESSED_EVENTS_RETENTION_DAYS: "7"
  OUTBOX_RETENTION_DAYS: "1"
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_USER: "dispute_admin"
  DB_NAME: "dispute_service"
  DB_SSLMODE: "disable"

secrets:
  # Do NOT set values here. Inject via CI/CD:
  DB_PASSWORD: ""

hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

gateway:
  enabled: false
  hostname: "dispute.com"
  tls:
    certificateName: "dispute-service-tls"

httpRoute:
  enabled: true
  hosts:
    - "dispute.com"
  paths:
    - /api/v1
    - /health

grpcRoute:
  enabled: true
  hosts:
    - "dispute.com"
  services:
    - "dispute.v1.BookingService"

authorizationPolicy:
  enabled: true
  principals: []

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000

tolerations: []
nodeSelector: {}
affinity: {}
extraEnv: []
extraVolumeMounts: []
extraVolumes: []
