namespace:
  create: true
  labels:
    team: backend
    purpose: dispute-resolution
    service: dispute-service

replicaCount: 2

image:
  repository: ghcr.io/tianshi04/rent-a-girlfriend/dispute-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  ports:
    http: 8082
    grpc: 50051

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

config:
  SERVER_PORT: "8082"
  GRPC_PORT: "50051"
  APP_ENV: "production"
  DB_HOST: "postgres-postgresql.postgres-namespace.svc.cluster.local"
  DB_PORT: "5432"
  DB_USER: "dispute_admin"
  DB_NAME: "dispute_service"
  DB_SSLMODE: "disable"
  KAFKA_BROKERS: "kafka-1.kafka-namespace.svc.cluster.local:9092"
  KAFKA_TOPIC_DISPUTE: "dispute.events"
  OUTBOX_POLLING_INTERVAL_MS: "500"
  OUTBOX_BATCH_SIZE: "50"
  SAGA_RETRY_INTERVAL_SECONDS: "5.0"
  USE_MOCKS: "true"
  FINANCE_SERVICE_ADDR: "finance-service.finance-namespace.svc.cluster.local:50051"
  INTERACTION_SERVICE_ADDR: "interaction-service.interaction-namespace.svc.cluster.local:50051"

secrets:
  DB_PASSWORD: ""

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

gateway:
  enabled: false
  hostname: "dispute.example.com"
  tls:
    certificateName: "dispute-service-tls"

httpRoute:
  enabled: true
  hosts:
    - "dispute.example.com"
  paths:
    - /api/v1/disputes
    - /health

  authorizationPolicy:
    enabled: true

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000

tolerations: []

nodeSelector: {}

affinity: {}

extraEnv: []

extraVolumeMounts: []

extraVolumes: []
