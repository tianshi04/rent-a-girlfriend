# Production environment overrides.
# Applied on top of values.yaml: helm install ... -f values.yaml -f values.prod.yaml
replicaCount: 3

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

config:
  GIN_MODE: "release"
  ENABLE_TEST_ROUTES: "false"

namespace:
  istio:
    ambientEnabled: true
