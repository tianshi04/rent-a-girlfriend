{{- if and .Values.httpRoute.enabled .Values.httpRoute.parentRefs }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "identity-service.fullname" . }}-httproute
  labels:
    {{- include "identity-service.labels" . | nindent 4 }}
spec:
  parentRefs:
    {{- toYaml .Values.httpRoute.parentRefs | nindent 4 }}
  {{- if .Values.httpRoute.hosts }}
  hostnames:
  {{- range .Values.httpRoute.hosts }}
    - {{ . | quote }}
  {{- end }}
  {{- end }}
  rules:
    - matches:
      {{- range .Values.httpRoute.paths }}
        - path:
            type: PathPrefix
            value: {{ . }}
      {{- end }}
      backendRefs:
        - name: {{ include "identity-service.fullname" $ }}
          port: {{ $.Values.service.ports.http }}
{{- end }}
