replicaCount: 3

image:
  repository: ghcr.io/tianshi04/rent-a-girlfriend/profile-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  ports:
    http: 8080
    grpc: 50051

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

config:
  SERVER_PORT: "8080"
  GRPC_PORT: "50051"
  APP_ENV: "production"
  DB_SSLMODE: "disable"
  S3_ENDPOINT_URL: ""
  S3_REGION: "us-east-1"
  S3_BUCKET_NAME: "rentgf-media"
  KAFKA_BROKERS: "kafka.kafka.svc.cluster.local:9092"
  KAFKA_TOPIC_PROFILE: "profile.events"
  OUTBOX_POLLING_INTERVAL_MS: "500"
  OUTBOX_BATCH_SIZE: "50"
  DB_CLEANUP_INTERVAL_MINUTES: "30"
  OUTBOX_RETENTION_DAYS: "1"

# If existingSecret is specified, the Helm chart will not create a Secret resource
# and will instead reference the existing Secret name provided here.
existingSecret: ""

hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

gateway:
  enabled: false
  hostname: ""
  tls:
    certificateName: "profile-service-tls"

httpRoute:
  enabled: true
  parentRefs: []
  hosts: []
  paths:
    - /api/v1/companions
    - /api/v1/profile

grpcRoute:
  enabled: true
  parentRefs: []
  services:
    - "profile.v1.ProfileService"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000

tolerations: []

nodeSelector: {}

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - profile-service
          topologyKey: "kubernetes.io/hostname"

extraEnv: []

extraVolumeMounts: []

extraVolumes: []
