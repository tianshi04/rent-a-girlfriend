namespace:
  create: true
  labels:
    team: backend
    purpose: profile-management
    service: profile-service

replicaCount: 2

image:
  repository: ghcr.io/tianshi04/rent-a-girlfriend/profile-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  ports:
    http: 8080
    grpc: 50051

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

config:
  SERVER_PORT: "8080"
  GRPC_PORT: "50051"
  APP_ENV: "production"
  DB_HOST: "postgres-postgresql.postgres-namespace.svc.cluster.local"
  DB_PORT: "5432"
  DB_USER: "profile_admin"
  DB_NAME: "profile_service"
  DB_SSLMODE: "disable"
  S3_ENDPOINT_URL: "http://minio.storage-namespace.svc.cluster.local:9000"
  S3_REGION: "us-east-1"
  S3_BUCKET_NAME: "rentgf-media"
  KAFKA_BROKERS: "kafka-1.kafka-namespace.svc.cluster.local:9092"
  KAFKA_TOPIC_PROFILE: "profile.events"
  OUTBOX_POLLING_INTERVAL_MS: "500"
  OUTBOX_BATCH_SIZE: "50"

secrets:
  DB_PASSWORD: ""
  S3_ACCESS_KEY_ID: ""
  S3_SECRET_ACCESS_KEY: ""
  KAFKA_USERNAME: ""
  KAFKA_PASSWORD: ""

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

gateway:
  enabled: false
  hostname: "profile.example.com"
  tls:
    certificateName: "profile-service-tls"

httpRoute:
  enabled: true
  hosts:
    - "profile.example.com"
  paths:
    - /api/v1/profiles
    - /health

  authorizationPolicy:
    enabled: true

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000

tolerations: []

nodeSelector: {}

affinity: {}

extraEnv: []

extraVolumeMounts: []

extraVolumes: []
