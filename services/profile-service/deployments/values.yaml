namespace:
  create: true
  labels:
    team: backend
    purpose: profile-catalogue
    service: profile-service
  istio:
    # Set to false in dev/local environments to skip Istio Ambient injection
    ambientEnabled: true

replicaCount: 3

image:
  repository: your-registry/profile-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  ports:
    http: 8080
    grpc: 50051

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

config:
  SERVER_PORT: "8080"
  GRPC_PORT: "50051"
  APP_ENV: "production"
  KAFKA_BROKERS: "kafka-headless.kafka.svc.cluster.local:9092"
  KAFKA_TOPIC_PROFILE: "profile.events"
  OUTBOX_POLLING_INTERVAL_MS: "500"
  OUTBOX_BATCH_SIZE: "50"
  DB_CLEANUP_INTERVAL_MINUTES: "30"
  OUTBOX_RETENTION_DAYS: "1"
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_USER: "profile_admin"
  DB_NAME: "profile_service"
  DB_SSLMODE: "disable"
  S3_ENDPOINT_URL: "http://minio.minio.svc.cluster.local:9000"
  S3_REGION: "us-east-1"
  S3_BUCKET_NAME: "rentgf-media"

secrets:
  # Do NOT set values here. Inject via CI/CD:
  DB_PASSWORD: ""
  KAFKA_USERNAME: ""
  KAFKA_PASSWORD: ""
  S3_ACCESS_KEY_ID: ""
  S3_SECRET_ACCESS_KEY: ""

hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000

tolerations: []
nodeSelector: {}
affinity: {}
extraEnv: []
extraVolumeMounts: []
extraVolumes: []
