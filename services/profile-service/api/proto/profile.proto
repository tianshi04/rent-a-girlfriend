syntax = "proto3";

package profile.v1;

option go_package = "github.com/rent-a-girlfriend/contracts/proto/profile;profilev1";

service ProfileService {
  // Commands (REST for Query, gRPC for Commands)
  rpc CreateProfile(CreateProfileRequest) returns (ProfileCommandResponse);
  rpc UpdateProfile(UpdateProfileRequest) returns (ProfileCommandResponse);
  rpc ApproveProfile(ApproveProfileRequest) returns (ProfileCommandResponse);
  rpc RejectProfile(RejectProfileRequest) returns (ProfileCommandResponse);

  // Scenario Commands
  // [INV-P01] Price must be > 0.
  // [INV-P02] Duration must be standard (60, 120, 180 min).
  // [INV-P03] A companion can have at most N active scenarios (e.g. 5).
  rpc CreateScenario(CreateScenarioRequest) returns (ScenarioCommandResponse);
  rpc UpdateScenario(UpdateScenarioRequest) returns (ScenarioCommandResponse);
  rpc DeleteScenario(DeleteScenarioRequest) returns (ScenarioCommandResponse);

  // Voice Intro / Media Commands
  // [INV-P04] Voice duration <= 30 seconds.
  // [INV-P05] Voice size <= 5MB.
  rpc RegisterVoiceIntro(RegisterVoiceIntroRequest) returns (MediaCommandResponse);
  rpc RegisterAlbumImage(RegisterAlbumImageRequest) returns (MediaCommandResponse);

  // Internal Queries
  rpc GetScenarioSnapshot(GetScenarioSnapshotRequest) returns (ScenarioSnapshotResponse);
}

message CreateProfileRequest {
  string user_id = 1;
  string display_name = 2;
  string intro_text = 3;
  repeated string available_cities = 4;
}

message UpdateProfileRequest {
  string companion_id = 1;
  string display_name = 2;
  string intro_text = 3;
  repeated string available_cities = 4;
  string avatar_url = 5;
}

message ApproveProfileRequest {
  string companion_id = 1;
  string admin_id = 2;
}

message RejectProfileRequest {
  string companion_id = 1;
  string admin_id = 2;
  string reason = 3;
}

message CreateScenarioRequest {
  string companion_id = 1;
  string title = 2;
  string description = 3;
  int64 price = 4; // Kano-Coin (BR-04 integer representation)
  int32 duration_minutes = 5; // Standard values: 60, 120, 180 (INV-P02)
}

message UpdateScenarioRequest {
  string scenario_id = 1;
  string companion_id = 2;
  string title = 3;
  string description = 4;
  int64 price = 5;
  int32 duration_minutes = 6;
  string status = 7; // ACTIVE, INACTIVE
}

message DeleteScenarioRequest {
  string scenario_id = 1;
  string companion_id = 2;
}

message RegisterVoiceIntroRequest {
  string companion_id = 1;
  string file_url = 2;
  int32 duration_seconds = 3; // Max 30s (INV-P04)
  int64 size_bytes = 4; // Max 5MB (INV-P05)
}

message RegisterAlbumImageRequest {
  string companion_id = 1;
  string file_url = 2;
  int64 size_bytes = 3; // Max 2MB (BR-12)
}

message ProfileCommandResponse {
  string companion_id = 1;
  string status = 2;
  string message = 3;
}

message ScenarioCommandResponse {
  string scenario_id = 1;
  string status = 2;
  string message = 3;
}

message MediaCommandResponse {
  string asset_id = 1;
  string status = 2; // PENDING, APPROVED, REJECTED
  string message = 3;
}

message GetScenarioSnapshotRequest {
  string scenario_id = 1;
}

message ScenarioSnapshotResponse {
  string scenario_id = 1;
  string companion_id = 2;
  string title = 3;
  int64 price = 4;
  int32 duration_minutes = 5;
}
