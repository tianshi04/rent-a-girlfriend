asyncapi: 2.6.0
info:
  title: Profile Service Events
  version: 1.0.0
  description: Events published by the Profile & Catalogue Service via Kafka.

channels:
  profile.profile-created.v1:
    publish:
      summary: Companion profile created
      message:
        $ref: '#/components/messages/ProfileCreated'

  profile.profile-updated.v1:
    publish:
      summary: Companion profile updated
      message:
        $ref: '#/components/messages/ProfileUpdated'

  profile.profile-approved.v1:
    publish:
      summary: Companion profile approved by admin
      message:
        $ref: '#/components/messages/ProfileApproved'

  profile.profile-rejected.v1:
    publish:
      summary: Companion profile rejected by admin
      message:
        $ref: '#/components/messages/ProfileRejected'

  profile.scenario-created.v1:
    publish:
      summary: Companion scenario created
      message:
        $ref: '#/components/messages/ScenarioCreated'

  profile.scenario-updated.v1:
    publish:
      summary: Companion scenario updated
      message:
        $ref: '#/components/messages/ScenarioUpdated'

  profile.scenario-deleted.v1:
    publish:
      summary: Companion scenario deleted
      message:
        $ref: '#/components/messages/ScenarioDeleted'

  profile.voice-intro-registered.v1:
    publish:
      summary: Companion voice intro registered successfully
      message:
        $ref: '#/components/messages/VoiceIntroUploaded'

  profile.voice-intro-rejected.v1:
    publish:
      summary: Companion voice intro rejected due to validation failure
      message:
        $ref: '#/components/messages/VoiceIntroRejected'

  profile.album-image-registered.v1:
    publish:
      summary: Companion album image uploaded
      message:
        $ref: '#/components/messages/AlbumImageUploaded'

components:
  messages:
    ProfileCreated:
      payload:
        type: object
        properties:
          companionId: { type: string, format: uuid }
          userId: { type: string, format: uuid }
          displayName: { type: string }
          availableCities:
            type: array
            items: { type: string }
          timestamp: { type: string, format: date-time }

    ProfileUpdated:
      payload:
        type: object
        properties:
          companionId: { type: string, format: uuid }
          displayName: { type: string }
          introText: { type: string }
          availableCities:
            type: array
            items: { type: string }
          timestamp: { type: string, format: date-time }

    ProfileApproved:
      payload:
        type: object
        properties:
          companionId: { type: string, format: uuid }
          approvedBy: { type: string, format: uuid }
          timestamp: { type: string, format: date-time }

    ProfileRejected:
      payload:
        type: object
        properties:
          companionId: { type: string, format: uuid }
          rejectedBy: { type: string, format: uuid }
          reason: { type: string }
          timestamp: { type: string, format: date-time }

    ScenarioCreated:
      payload:
        type: object
        properties:
          scenarioId: { type: string, format: uuid }
          companionId: { type: string, format: uuid }
          title: { type: string }
          price: { type: integer }
          durationMinutes: { type: integer }
          timestamp: { type: string, format: date-time }

    ScenarioUpdated:
      payload:
        type: object
        properties:
          scenarioId: { type: string, format: uuid }
          companionId: { type: string, format: uuid }
          title: { type: string }
          price: { type: integer }
          durationMinutes: { type: integer }
          status: { type: string }
          timestamp: { type: string, format: date-time }

    ScenarioDeleted:
      payload:
        type: object
        properties:
          scenarioId: { type: string, format: uuid }
          companionId: { type: string, format: uuid }
          timestamp: { type: string, format: date-time }

    VoiceIntroUploaded:
      payload:
        type: object
        properties:
          companionId: { type: string, format: uuid }
          assetId: { type: string, format: uuid }
          fileUrl: { type: string, format: uri }
          durationSeconds: { type: integer }
          sizeBytes: { type: integer }
          timestamp: { type: string, format: date-time }

    VoiceIntroRejected:
      payload:
        type: object
        properties:
          companionId: { type: string, format: uuid }
          fileUrl: { type: string, format: uri }
          reason: { type: string }
          timestamp: { type: string, format: date-time }

    AlbumImageUploaded:
      payload:
        type: object
        properties:
          companionId: { type: string, format: uuid }
          assetId: { type: string, format: uuid }
          fileUrl: { type: string, format: uri }
          sizeBytes: { type: integer }
          timestamp: { type: string, format: date-time }
