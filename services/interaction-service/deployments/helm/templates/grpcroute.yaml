{{- if .Values.grpcRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: GRPCRoute
metadata:
  name: {{ include "interaction-service.fullname" . }}-grpcroute
  labels:
    {{- include "interaction-service.labels" . | nindent 4 }}
spec:
  parentRefs:
    - group: ""
      kind: Service
      name: {{ include "interaction-service.fullname" . }}
      port: {{ .Values.service.ports.grpc }}
  rules:
    - matches:
      {{- range .Values.grpcRoute.services }}
        - method:
            service: {{ . | quote }}
      {{- end }}
      backendRefs:
        - name: {{ include "interaction-service.fullname" $ }}
          port: {{ $.Values.service.ports.grpc }}
{{- end }}
