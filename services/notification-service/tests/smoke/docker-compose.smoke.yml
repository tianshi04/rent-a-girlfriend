services:
  notification-db:
    image: postgres:15-alpine
    container_name: notification-db-smoke
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notification_db"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - smoke-network

  redis:
    image: redis:7-alpine
    container_name: redis-smoke
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - smoke-network

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka-smoke
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - smoke-network

  notification-service:
    image: ${NOTIFICATION_IMAGE:-rentagf/notification-service:smoke}
    build:
      context: ../../
      dockerfile: Dockerfile
    container_name: notification-service-smoke
    ports:
      - "8084:8084"
    environment:
      - SERVER_PORT=8084
      - DB_HOST=notification-db
      - DB_PORT=5432
      - DB_NAME=notification_db
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - TEMPLATES_PATH=classpath:templates.yaml
      - MANAGEMENT_HEALTH_MAIL_ENABLED=false
    depends_on:
      notification-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - smoke-network

networks:
  smoke-network:
    driver: bridge
