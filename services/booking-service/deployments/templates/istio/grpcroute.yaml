{{- if .Values.grpcRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: GRPCRoute
metadata:
  name: {{ include "booking-service.fullname" . }}-grpcroute
  labels:
    {{- include "booking-service.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: global-gateway
      namespace: istio-ingress
  hostnames:
  {{- range .Values.grpcRoute.hosts }}
    - {{ . | quote }}
  {{- end }}
  rules:
    {{- range .Values.grpcRoute.services }}
    - matches:
        - method:
            service: {{ . | quote }}
      backendRefs:
        - name: {{ include "booking-service.fullname" $ }}
          port: {{ $.Values.service.ports.grpc }}
    {{- end }}
{{- end }}
