{{- if .Values.httpRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: {{ include "booking-service.fullname" . }}-httproute
  labels:
    {{- include "booking-service.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: global-gateway
      namespace: istio-ingress
  hostnames:
  {{- range .Values.httpRoute.hosts }}
    - {{ . | quote }}
  {{- end }}
  rules:
    {{- range .Values.httpRoute.paths }}
    - matches:
        - path:
            type: PathPrefix
            value: {{ . }}
      backendRefs:
        - name: {{ include "booking-service.fullname" $ }}
          port: {{ $.Values.service.ports.http }}
    {{- end }}
{{- end }}
