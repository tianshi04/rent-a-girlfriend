services:
  postgres-test:
    image: postgres:15-alpine
    container_name: booking-postgres-test
    environment:
      POSTGRES_DB: booking_test_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d booking_test_db"]
      interval: 2s
      timeout: 2s
      retries: 10

  kafka-test:
    image: apache/kafka:3.7.0
    container_name: booking-kafka-test
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@localhost:9093'
      KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://localhost:9092,EXTERNAL://localhost:9094'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 2s
      timeout: 2s
      retries: 15

  mock-grpc-test:
    image: golang:1.25-alpine
    container_name: booking-mock-grpc-test
    volumes:
      - .:/app
    working_dir: /app
    ports:
      - "50053:50052" # Profile port
      - "50054:50053" # Finance port
    command: go run tests/mock/mock_grpc/mock_grpc.go

  booking-service-test:
    image: ${BOOKING_IMAGE:-booking-service-test:latest}
    build:
      context: .
      dockerfile: Dockerfile
      target: test
      args:
        BUILD_TAGS: ""
    ports:
      - "8081:8080"
      - "50052:50051"
    depends_on:
      postgres-test:
        condition: service_healthy
      kafka-test:
        condition: service_healthy
      mock-grpc-test:
        condition: service_started
    environment:
      SERVER_PORT: "8080"
      GRPC_PORT: "50051"
      GIN_MODE: "test"
      DB_HOST: "postgres-test"
      DB_PORT: "5432"
      DB_USER: "postgres"
      DB_PASSWORD: "postgres"
      DB_NAME: "booking_test_db"
      DB_SSLMODE: "disable"
      DATABASE_URL: "postgres://postgres:postgres@postgres-test:5432/booking_test_db?sslmode=disable"
      KAFKA_BROKERS: "kafka-test:9092"
      KAFKA_TOPIC_BOOKING: "booking-events-test"
      KAFKA_TOPIC_FINANCE: "finance-events-test"
      KAFKA_TOPIC_INTERACTION: "interaction-events-test"
      KAFKA_TOPIC_DISPUTE: "dispute-events-test"
      PROFILE_SERVICE_ADDR: "mock-grpc-test:50052"
      FINANCE_SERVICE_ADDR: "mock-grpc-test:50053"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 2s
      timeout: 2s
      retries: 10

  e2e-runner:
    image: golang:1.25-alpine
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      booking-service-test:
        condition: service_healthy
    environment:
      E2E_BASE_URL: "http://booking-service-test:8080"
      DATABASE_URL: "postgres://postgres:postgres@postgres-test:5432/booking_test_db?sslmode=disable"
    command: go test ./tests/e2e/... -v -count=1 -timeout 180s
